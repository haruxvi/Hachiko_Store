name: Dependency Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # Captura el resultado del audit sin cortar el job, para poder adjuntarlo
      # al issue. exit_code != 0 => se encontraron vulnerabilidades >= low.
      - name: Audit
        id: audit
        shell: bash
        run: |
          set +e
          pnpm audit --audit-level=low | tee audit-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check outdated
        run: pnpm outdated || true

      # Solo reporta cuando el audit realmente falló. Reutiliza el issue abierto
      # (comenta en vez de duplicar) e incluye el output real + link al run.
      - name: Report vulnerabilities
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-output.txt', 'utf8').slice(0, 60000);
            const title = '🔒 Vulnerabilidades detectadas en dependencias';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'El audit semanal (`pnpm audit --audit-level=low`) detectó vulnerabilidades.',
              '',
              `Run: ${runUrl}`,
              '',
              '<details><summary>Output de pnpm audit</summary>',
              '',
              '```',
              report,
              '```',
              '',
              '</details>',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies',
            });
            const openIssue = existing.data.find((i) => i.title === title);

            if (openIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'dependencies'],
              });
            }
